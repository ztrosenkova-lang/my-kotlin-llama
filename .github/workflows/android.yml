name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Accept Android SDK Licenses
      run: |
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Fix Line Endings (CRLF to LF)
      run: |
        sudo apt-get update && sudo apt-get install -y dos2unix
        dos2unix gradlew
        dos2unix gradle/wrapper/gradle-wrapper.properties

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Download and prepare Vosk model
      run: |
        echo "Downloading Vosk model..."
        mkdir -p app/src/main/assets
        cd app/src/main/assets
        wget -O vosk-model-small-ru-0.22.zip https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip
        echo "Extracting Vosk model..."
        unzip -q vosk-model-small-ru-0.22.zip
        echo "Moving model to flat directory structure..."
        if [ -d "vosk-model-small-ru-0.22" ]; then
          mv vosk-model-small-ru-0.22/* .
          rm -rf vosk-model-small-ru-0.22
        fi
        rm vosk-model-small-ru-0.22.zip
        echo "Model prepared. Contents:"
        ls -la
        echo "Vosk model ready"

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
